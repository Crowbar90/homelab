apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: home-assistant
  namespace: kube-system
spec:
  chart: home-assistant
  repo: https://pajikos.github.io/home-assistant-helm-chart/
  version: "0.3.57"
  targetNamespace: home-assistant
  valuesContent: |-
    image:
      tag: stable

    timezone: Europe/Rome

    persistence:
      enabled: true
      storageClass: nfs-client
      accessMode: ReadWriteOnce
      size: 10Gi

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-cloudflare
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - host: homeassistant.k3s.middleearth.cc
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: homeassistant-tls
          hosts:
            - homeassistant.k3s.middleearth.cc

    # Optional: Discovery features often need hostNetwork
    # hostNetwork: true
    # dnsPolicy: ClusterFirstWithHostNet
