apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: telegram-repeater-bot
  namespace: kube-system
spec:
  bootstrap: false
  chart: oci://ghcr.io/crowbar90/charts/telegram-repeater-bot
  version: "0.2.1"
  targetNamespace: telegram-repeater-bot
  valuesContent: |-
    replicaCount: 2
    image:
      repository: ghcr.io/crowbar90/telegram-repeater-bot
      tag: main
    bot:
      inputChatId: "231388170"
      outputChatId: "-5161691869"
      outputTopicId: null
    secret:
      name: telegram-repeater-bot-secrets
      key: bot-token
